<!DOCTYPE html>
<html>
<head>
    <title>RAG Chatbot</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 700px;
            margin: 50px auto;
            padding: 20px;
        }

        h2 {
            margin-bottom: 5px;
        }

        #upload-section {
            border: 2px dashed #ccc;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }

        #upload-status {
            margin-top: 10px;
            font-size: 0.9em;
            color: #555;
        }

        #upload-status.success {
            color: #1a7f37;
            font-weight: bold;
        }

        #upload-status.error {
            color: #c62828;
            font-weight: bold;
        }

        #chat {
            border: 1px solid #ccc;
            height: 400px;
            overflow-y: auto;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
        }

        .message {
            margin: 10px 0;
            padding: 10px;
            border-radius: 8px;
        }

        .user {
            background: #007bff;
            color: white;
            text-align: right;
        }

        .bot {
            background: #f1f1f1;
            color: #333;
        }

        .sources {
            font-size: 0.8em;
            color: #666;
            margin-top: 5px;
            font-style: italic;
        }

        #input-area {
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }

        button {
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:disabled {
            background: #aaa;
            cursor: not-allowed;
        }

        input:disabled {
            background: #eee;
        }
    </style>
</head>
<body>

    <h2>📚 RAG Chatbot</h2>
    <p>Upload a PDF, then ask questions about it.</p>

    <div id="upload-section">
        <input type="file" id="pdf-file" accept="application/pdf">
        <button id="upload-btn" onclick="uploadFile()">Upload PDF</button>
        <div id="upload-status"></div>
    </div>

    <div id="chat"></div>

    <div id="input-area">
        <input type="text" id="question" placeholder="Upload a PDF first..." disabled
               onkeypress="if(event.key === 'Enter') ask()">
        <button id="send-btn" onclick="ask()" disabled>Send</button>
    </div>

    <script>
        const uploadStatus = document.getElementById('upload-status');
        const questionInput = document.getElementById('question');
        const sendBtn = document.getElementById('send-btn');
        const uploadBtn = document.getElementById('upload-btn');
        const chat = document.getElementById('chat');

        async function uploadFile() {
            const fileInput = document.getElementById('pdf-file');
            const file = fileInput.files[0];

            if (!file) {
                uploadStatus.textContent = 'Please choose a PDF file first.';
                uploadStatus.className = 'error';
                return;
            }

            if (!file.name.toLowerCase().endsWith('.pdf')) {
                uploadStatus.textContent = 'Only PDF files are supported.';
                uploadStatus.className = 'error';
                return;
            }

            const formData = new FormData();
            formData.append('file', file);

            uploadBtn.disabled = true;
            uploadStatus.textContent = 'Uploading and processing PDF... this may take a moment.';
            uploadStatus.className = '';

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (!response.ok) {
                    uploadStatus.textContent = data.detail || 'Upload failed.';
                    uploadStatus.className = 'error';
                    return;
                }

                uploadStatus.textContent =
                    `✓ "${data.filename}" indexed successfully (${data.chunks_created} chunks). You can start chatting now.`;
                uploadStatus.className = 'success';

                questionInput.disabled = false;
                sendBtn.disabled = false;
                questionInput.placeholder = 'Ask a question about your document...';
                questionInput.focus();

                chat.innerHTML = '';

            } catch (error) {
                uploadStatus.textContent = 'Could not connect to the server. Is FastAPI running?';
                uploadStatus.className = 'error';
                console.error(error);
            } finally {
                uploadBtn.disabled = false;
            }
        }

        async function ask() {
            const q = questionInput.value.trim();
            if (!q) return;

            const userMessage = document.createElement('div');
            userMessage.className = 'message user';
            userMessage.textContent = q;
            chat.appendChild(userMessage);

            questionInput.value = '';
            questionInput.disabled = true;
            sendBtn.disabled = true;

            const loading = document.createElement('div');
            loading.className = 'message bot';
            loading.id = 'loading';
            loading.textContent = 'Thinking...';
            chat.appendChild(loading);
            chat.scrollTop = chat.scrollHeight;

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: q })
                });

                const data = await response.json();
                loading.remove();

                const botMessage = document.createElement('div');
                botMessage.className = 'message bot';

                if (!response.ok) {
                    botMessage.textContent = data.detail || 'Something went wrong.';
                } else {
                    const answerDiv = document.createElement('div');
                    answerDiv.textContent = data.answer;

                    const sourcesDiv = document.createElement('div');
                    sourcesDiv.className = 'sources';
                    sourcesDiv.textContent = `Retrieved ${data.sources.length} relevant sections.`;

                    botMessage.appendChild(answerDiv);
                    botMessage.appendChild(sourcesDiv);
                }

                chat.appendChild(botMessage);

            } catch (error) {
                loading.remove();
                const errorMessage = document.createElement('div');
                errorMessage.className = 'message bot';
                errorMessage.textContent = 'Could not connect to the chatbot server.';
                chat.appendChild(errorMessage);
                console.error(error);
            } finally {
                questionInput.disabled = false;
                sendBtn.disabled = false;
                questionInput.focus();
                chat.scrollTop = chat.scrollHeight;
            }
        }
    </script>
</body>
</html>
